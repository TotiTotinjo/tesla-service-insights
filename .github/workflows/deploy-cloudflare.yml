name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Deploy (OpenNext → Cloudflare)
        run: npm run deploy
        env:
          # Create at https://dash.cloudflare.com/profile/api-tokens
          # Template: "Edit Cloudflare Workers"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Optional: only needed if secret is not already set on the Worker
          # XAI_API_KEY should be set once via: wrangler secret put XAI_API_KEY
