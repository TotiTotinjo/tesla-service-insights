# Linux OpenNext build — artifact can be deployed with local `wrangler` OAuth
name: Build OpenNext (Linux)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx opennextjs-cloudflare build
      - uses: actions/upload-artifact@v4
        with:
          name: open-next-bundle
          path: |
            .open-next/**
            wrangler.jsonc
          retention-days: 2
